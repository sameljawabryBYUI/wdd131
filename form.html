<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Samar Abbas">
    <meta name="description" content="Official Product Review Form for WDD131. Please use this form to submit reviews for our time travel products.">
    <title>Product Review Form</title>
    
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html" class="review-form">
            <fieldset>
                <legend>Product Information</legend>
                
                <div class="form-group">
                    <label for="product">Product Name <span class="required">*</span></label>
                    <select id="product" name="product" required>
                        <option value="" disabled selected>Select a Product ...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Overall Rating <span class="required">*</span></label>
                    <div class="rating">
                        <input type="radio" id="r1" name="rating" value="1" required>
                        <label for="r1">1 ☆</label>
                        
                        <input type="radio" id="r2" name="rating" value="2" required>
                        <label for="r2">2 ☆</label>
                        
                        <input type="radio" id="r3" name="rating" value="3" required>
                        <label for="r3">3 ☆</label>
                        
                        <input type="radio" id="r4" name="rating" value="4" required>
                        <label for="r4">4 ☆</label>
                        
                        <input type="radio" id="r5" name="rating" value="5" required>
                        <label for="r5">5 ☆</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="install-date">Date of Installation <span class="required">*</span></label>
                    <input type="date" id="install-date" name="install-date" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Optional Feedback</legend>
                
                <div class="form-group">
                    <label>Which features did you find useful? (Check all that apply)</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="c1" name="feature" value="durability">
                        <label for="c1">Durability</label>

                        <input type="checkbox" id="c2" name="feature" value="ease">
                        <label for="c2">Ease of Use</label>

                        <input type="checkbox" id="c3" name="feature" value="perf">
                        <label for="c3">Performance</label>

                        <input type="checkbox" id="c4" name="feature" value="design">
                        <label for="c4">Design</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="review">Written Review</label>
                    <textarea id="review" name="written-review" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label for="user">Your Name</label>
                    <input type="text" id="user" name="user-name">
                </div>
            </fieldset>

            <input type="submit" value="Post Review" class="submit-btn">
        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> | Samar Abbas | WDD131</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
