<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product Review Form for WDD131">
    <title>Product Review Form</title>
    
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html" class="review-form">
            <fieldset>
                <legend>Product Information</legend>
                
                <div class="form-group">
                    <label for="product">Product Name <span class="required">*</span></label>
                    <select id="product" name="product" required>
                        <option value="" disabled selected>Select a Product ...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Overall Rating <span class="required">*</span></label>
                    <div class="rating">
                        <label><input type="radio" name="rating" value="1" required> 1 ☆</label>
                        <label><input type="radio" name="rating" value="2" required> 2 ☆</label>
                        <label><input type="radio" name="rating" value="3" required> 3 ☆</label>
                        <label><input type="radio" name="rating" value="4" required> 4 ☆</label>
                        <label><input type="radio" name="rating" value="5" required> 5 ☆</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="install-date">Date of Installation <span class="required">*</span></label>
                    <input type="date" id="install-date" name="install-date" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Optional Feedback</legend>
                
                <div class="form-group">
                    <label>Which features did you find useful? (Check all that apply)</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="feature" value="durability"> Durability</label>
                        <label><input type="checkbox" name="feature" value="ease-of-use"> Ease of Use</label>
                        <label><input type="checkbox" name="feature" value="performance"> Performance</label>
                        <label><input type="checkbox" name="feature" value="design"> Design</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="written-review">Written Review</label>
                    <textarea id="written-review" name="written-review" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label for="user-name">Your Name</label>
                    <input type="text" id="user-name" name="user-name">
                </div>
            </fieldset>

            <input type="submit" value="Post Review" class="submit-btn">
        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> | Sam | WDD131</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
