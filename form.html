<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A professional product review form for WDD131 to practice form design and local storage use.">
    <meta name="author" content="Samar Abbas">
    <title>Product Review Form</title>
    
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html" class="review-form">
            <fieldset>
                <legend>Product Information</legend>
                
                <div class="form-group">
                    <label for="product">Product Name <span class="required">*</span></label>
                    <select id="product" name="product" required>
                        <option value="" disabled selected>Select a Product ...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Overall Rating <span class="required">*</span></label>
                    <div class="rating">
                        <input type="radio" id="rating1" name="rating" value="1" required>
                        <label for="rating1">1 ☆</label>
                        
                        <input type="radio" id="rating2" name="rating" value="2" required>
                        <label for="rating2">2 ☆</label>
                        
                        <input type="radio" id="rating3" name="rating" value="3" required>
                        <label for="rating3">3 ☆</label>
                        
                        <input type="radio" id="rating4" name="rating" value="4" required>
                        <label for="rating4">4 ☆</label>
                        
                        <input type="radio" id="rating5" name="rating" value="5" required>
                        <label for="rating5">5 ☆</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="install-date">Date of Installation <span class="required">*</span></label>
                    <input type="date" id="install-date" name="install-date" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Optional Feedback</legend>
                
                <div class="form-group">
                    <label>Which features did you find useful? (Check all that apply)</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="feature-durability" name="feature" value="durability">
                        <label for="feature-durability">Durability</label>

                        <input type="checkbox" id="feature-ease" name="feature" value="ease-of-use">
                        <label for="feature-ease">Ease of Use</label>

                        <input type="checkbox" id="feature-performance" name="feature" value="performance">
                        <label for="feature-performance">Performance</label>

                        <input type="checkbox" id="feature-design" name="feature" value="design">
                        <label for="feature-design">Design</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="written-review">Written Review</label>
                    <textarea id="written-review" name="written-review" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label for="user-name">Your Name</label>
                    <input type="text" id="user-name" name="user-name">
                </div>
            </fieldset>

            <input type="submit" value="Post Review" class="submit-btn">
        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> | Samar Abbas | WDD131</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
